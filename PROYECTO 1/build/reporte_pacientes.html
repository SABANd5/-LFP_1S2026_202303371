<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Historial de Pacientes</title>
<style>
body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8f9fa; padding: 20px; }
h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #2E7D52; padding-bottom: 10px; }
table { width: 90%; margin: 20px auto; border-collapse: collapse; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
th, td { padding: 12px 15px; border: 1px solid #dee2e6; text-align: center; }
th { background-color: #2E7D52; color: white; font-weight: bold; }
tr:nth-child(even) { background-color: #f2f2f2; }
.estado-activo { background-color: #d4edda; color: #155724; font-weight: bold; border-radius: 5px; padding: 5px; }
.estado-sindiag { background-color: #fff3cd; color: #856404; font-weight: bold; border-radius: 5px; padding: 5px; }
.estado-critico { background-color: #f8d7da; color: #721c24; font-weight: bold; border-radius: 5px; padding: 5px; }
</style>
</head>
<body>
<h1>Reporte 1: Historial de Pacientes</h1>
<table>
<tr><th>Paciente</th><th>Edad</th><th>Sangre</th><th>Diagnóstico Activo</th><th>Medicamento / Dosis</th><th>Estado</th></tr>
<tr><td>Hugo Activo</td><td>35</td><td>A+</td><td>Alergia</td><td>Loratadina / DIARIA</td><td><span class='estado-activo'>ACTIVO</span></td></tr>
<tr><td>Paco Sindiag</td><td>28</td><td>O-</td><td>Sin diagnóstico registrado</td><td>-</td><td><span class='estado-sindiag'>SIN DIAG.</span></td></tr>
<tr><td>Luis Critico</td><td>55</td><td>AB+</td><td>Gastritis</td><td>Omeprazol / CADA_8_HORAS</td><td><span class='estado-critico'>CRÍTICO</span></td></tr>
</table>
</body>
</html>
