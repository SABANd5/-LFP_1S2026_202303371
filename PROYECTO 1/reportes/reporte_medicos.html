<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carga de Médicos</title>
<style>
body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8f9fa; padding: 20px; }
h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #8E44AD; padding-bottom: 10px; }
table { width: 90%; margin: 20px auto; border-collapse: collapse; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
th, td { padding: 12px 15px; border: 1px solid #dee2e6; text-align: center; }
th { background-color: #8E44AD; color: white; font-weight: bold; }
tr:nth-child(even) { background-color: #f2f2f2; }
.carga-baja { background-color: #d1ecf1; color: #0c5460; font-weight: bold; padding: 5px; border-radius: 5px; }
.carga-normal { background-color: #d4edda; color: #155724; font-weight: bold; padding: 5px; border-radius: 5px; }
.carga-alta { background-color: #fff3cd; color: #856404; font-weight: bold; padding: 5px; border-radius: 5px; }
.carga-saturada { background-color: #f8d7da; color: #721c24; font-weight: bold; padding: 5px; border-radius: 5px; }
</style>
</head>
<body>
<h1>Reporte 2: Carga de Médicos por Especialidad</h1>
<table>
<tr><th>Médico</th><th>Código</th><th>Especialidad</th><th>Citas Prog.</th><th>Pacientes</th><th>Nivel de Carga</th></tr>
<tr><td>Dr. Baja</td><td>MED-001</td><td>PEDIATRIA</td><td>2</td><td>2</td><td><span class='carga-baja'>BAJA</span></td></tr>
<tr><td>Dra. Normal</td><td>MED-002</td><td>CARDIOLOGIA</td><td>5</td><td>3</td><td><span class='carga-normal'>NORMAL</span></td></tr>
<tr><td>Dr. Alta</td><td>MED-003</td><td>NEUROLOGIA</td><td>7</td><td>3</td><td><span class='carga-alta'>ALTA</span></td></tr>
<tr><td>Dra. Saturada</td><td>MED-004</td><td>CIRUGIA</td><td>10</td><td>3</td><td><span class='carga-saturada'>SATURADA</span></td></tr>
</table>
</body>
</html>
